<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bildirimler</title>

<style>
body {
  background: #07140f;
  color: #eafff4;
  font-family: Arial;
  padding: 16px;
}

.card {
  background: #0d2018;
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 12px;
  border: 1px solid rgba(255,255,255,0.05);
}

.msg {
  margin: 10px 0;
  font-size: 15px;
}

/* DETAY MODAL */
.detail-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
}

.detail-modal.show {
  display: flex;
}

.detail-box {
  background: #0d2018;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
}

.detail-close {
  margin-top: 15px;
  width: 100%;
  padding: 10px;
  background: #2aff9a;
  border: none;
}
</style>
</head>

<body>

<h2>Bildirimler</h2>

{% for item in items %}
<div class="card" data-message="{{ item.message }}" data-source="{{ item.status }}">
  <div class="msg">{{ item.message }}</div>
</div>
{% endfor %}

<div id="detailModal" class="detail-modal">
  <div class="detail-box">
    <h3>Detay</h3>
    <div id="detailMessage"></div>
    <div id="detailRisk"></div>
    <button class="detail-close" onclick="closeDetailModal()">Kapat</button>
  </div>
</div>

<script src="/static/js/swipe.js"></script>

</body>
</html>
