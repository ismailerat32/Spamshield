<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Kullanıcılar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f1115;
            color: #eee;
            margin: 0;
            padding: 20px;
        }
        .box {
            max-width: 900px;
            margin: 0 auto;
            background: #171a21;
            border: 1px solid #2b2f3a;
            border-radius: 16px;
            padding: 24px;
        }
        h2 { margin-top: 0; }
        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid #2c3240;
        }
        .user-row:last-child { border-bottom: none; }
        .name { font-weight: bold; color: #fff; }
        .meta {
            color: #aab1bf;
            font-size: 13px;
            margin-top: 4px;
            line-height: 1.5;
        }
        .danger-btn, .back-btn, .toggle-btn, .mail-btn {
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            color: white;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            margin-left: 6px;
        }
        .danger-btn { background: #b91c1c; }
        .toggle-btn { background: #d97706; }
        .mail-btn { background: #2563eb; }
        .back-btn {
            display: inline-block;
            margin-top: 18px;
            background: #2563eb;
        }
        .disabled {
            color: #888;
            font-size: 13px;
        }
        form { display: inline-block; }
    </style>
</head>
<body>
    <div class="box">
        <h2>👥 Kullanıcılar</h2>

        {% for uname, info in users.items() %}
            <div class="user-row">
                <div>
                    <div class="name">{{ uname }}</div>
                    <div class="meta">
                        Rol: {{ info.role }}<br>
                        Aktif: {{ info.active }}<br>
                        Mail: {{ info.email or '-' }}<br>
                        Lisans: {{ info.license_key }}<br>
                        Bitiş: {{ info.expires_at }}
                    </div>
                </div>
                <div>
                    {% if uname == "admin" %}
                        <div class="disabled">Admin kilitli</div>
                    {% else %}
                        <form method="POST" action="/send-license/{{ uname }}">
                            <button type="submit" class="mail-btn">Lisans Maili Gönder</button>
                        </form>
                        <form method="POST" action="/toggle-user/{{ uname }}">
                            <button type="submit" class="toggle-btn">
                                {% if info.active %}Pasif Yap{% else %}Aktif Yap{% endif %}
                            </button>
                        </form>
                        <form method="POST" action="/delete-user/{{ uname }}">
                            <button type="submit" class="danger-btn">Sil</button>
                        </form>
                    {% endif %}
                </div>
            </div>
        {% endfor %}

        <a class="back-btn" href="/">Panele Dön</a>
    </div>
</body>
</html>
