<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lisans Aktivasyonu</title>
<style>
body { background:#0f1115; color:white; font-family:Arial; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
.box { background:#171a21; padding:25px; border-radius:12px; width:320px; border:1px solid #2b2f3a; }
input,button,a { width:100%; box-sizing:border-box; padding:10px; margin:8px 0; border-radius:8px; border:1px solid #333845; background:#0f1115; color:white; text-decoration:none; display:block; text-align:center; }
button { background:#22c55e; border:none; cursor:pointer; font-weight:bold; }
.error { color:#ff8080; }
.success { color:#90ee90; }
</style>
</head>
<body>
<div class="box">
<h2>Lisans Aktivasyonu</h2>

{% if error %}<p class="error">{{ error }}</p>{% endif %}
{% if success %}<p class="success">{{ success }}</p>{% endif %}

<form method="POST">
<input name="username" placeholder="Kullanıcı adı" required>
<input name="license_key" placeholder="Lisans key" required>
<button type="submit">Aktif Et</button>
</form>

<a href="/login">Giriş Yap</a>
</div>
</body>
</html>
