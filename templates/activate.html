<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lisans Aktivasyonu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f1115;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .box {
            background: #171a21;
            border: 1px solid #2b2f3a;
            border-radius: 16px;
            padding: 28px;
            width: 380px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.35);
        }
        h2 { margin-top: 0; }
        .small {
            color: #aab1bf;
            font-size: 13px;
            margin-bottom: 16px;
        }
        input, button {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid #333845;
            background: #0f1115;
            color: #eee;
        }
        button {
            background: #1f6feb;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔑 Lisans Aktivasyonu</h2>
        <div class="small">SpamShield kullanmak için lisans anahtarını gir.</div>
        <form method="POST" action="/activate">
            <input name="license_key" placeholder="Lisans anahtarı" required>
            <button type="submit">Aktif Et</button>
        </form>
    </div>
</body>
</html>
