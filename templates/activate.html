<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lisans Aktivasyonu</title>
<style>
body { background:#0f1115; color:white; font-family:Arial; display:flex; justify-content:center; align-items:center; height:100vh; }
.box { background:#171a21; padding:25px; border-radius:12px; width:320px; }
input,button { width:100%; padding:10px; margin:8px 0; border-radius:8px; }
button { background:#22c55e; color:white; border:none; }
</style>
</head>
<body>
<div class="box">
<h2>Lisans Aktivasyonu</h2>

{% if error %}<p style="color:red">{{error}}</p>{% endif %}
{% if success %}<p style="color:lightgreen">{{success}}</p>{% endif %}

<form method="POST">
<input name="username" placeholder="Kullanıcı adı">
<input name="license_key" placeholder="Lisans key">
<button>Aktif Et</button>
</form>

<a href="/login">Giriş Yap</a>
</div>
</body>
</html>
