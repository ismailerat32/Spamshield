<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Lisans Aktifleştir</title>
<style>
body{
    background:linear-gradient(135deg,#0f172a,#0b1f5e,#1e3a8a);
    font-family:Arial,sans-serif;
    color:#fff;
    margin:0;
    min-height:100vh;
}
.wrap{
    max-width:520px;
    margin:60px auto;
    padding:24px;
}
.card{
    background:rgba(3,15,45,.95);
    padding:28px;
    border-radius:24px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}
h1{
    margin:0 0 24px;
    font-size:38px;
}
input,button{
    width:100%;
    box-sizing:border-box;
    padding:16px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.08);
    background:#020b2a;
    color:white;
    font-size:16px;
    margin-top:12px;
}
button{
    background:#1db446;
    border:0;
    font-weight:bold;
}
.msg{
    margin-top:18px;
    padding:14px;
    border-radius:14px;
    background:rgba(255,255,255,.08);
}
.link{
    display:inline-block;
    margin-top:18px;
    color:#bfdbfe;
    text-decoration:none;
}
</style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <h1>Lisans Aktifleştir</h1>

        <form method="POST">
            <input name="username" placeholder="Kullanıcı adı" required>
            <input name="license_key" placeholder="Lisans kodu" required>
            <button type="submit">Aktifleştir</button>
        </form>

        {% if message %}
        <div class="msg">{{ message }}</div>
        {% endif %}

        <a class="link" href="/dashboard">Dashboard'a dön</a>
    </div>
</div>
</body>
</html>
