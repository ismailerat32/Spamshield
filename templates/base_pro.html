<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpamShield PRO</title>
<style>
:root{
    --bg1:#02060d;
    --bg2:#06111d;
    --line:rgba(0,255,170,.18);
    --line-strong:rgba(120,255,190,.45);
    --card:rgba(7,20,28,.82);
    --text:#e8fff2;
    --muted:#9dd8b3;
    --ok:#19e68c;
}
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}
html,body{
    margin:0;
    min-height:100%;
    font-family:Arial, Helvetica, sans-serif;
    color:var(--text);
    background:
        radial-gradient(circle at 50% 15%, rgba(0,255,170,.08), transparent 20%),
        linear-gradient(180deg, var(--bg2), var(--bg1) 60%, #01040a);
}
.container{
    width:min(1100px, 94vw);
    margin:0 auto;
    padding:20px 0 32px;
}
.topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:18px;
}
.brand{
    font-size:28px;
    font-weight:800;
    color:#a8ffc9;
    text-shadow:0 0 18px rgba(0,255,160,.12);
}
.actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
.btn{
    text-decoration:none;
    color:#d7ffe8;
    padding:10px 16px;
    border-radius:999px;
    border:1px solid rgba(120,255,190,.14);
    background:rgba(10,26,36,.75);
    box-shadow:inset 0 0 10px rgba(0,255,160,.03);
    font-size:14px;
}
.hero{
    padding:18px;
    border:1px solid var(--line);
    border-radius:24px;
    background:linear-gradient(180deg, rgba(7,20,28,.85), rgba(5,15,22,.72));
    box-shadow:0 0 24px rgba(0,255,160,.06);
    margin-bottom:18px;
}
.hero h1{
    margin:0 0 8px;
    font-size:32px;
}
.hero p{
    margin:0;
    color:var(--muted);
}
.grid{
    display:grid;
    grid-template-columns:repeat(12, 1fr);
    gap:14px;
}
.card{
    grid-column:span 12;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:22px;
    padding:16px;
    box-shadow:0 0 18px rgba(0,255,160,.04);
}
@media (min-width:800px){
    .span-4{grid-column:span 4;}
    .span-6{grid-column:span 6;}
    .span-8{grid-column:span 8;}
    .span-12{grid-column:span 12;}
}
.card h3{
    margin:0 0 12px;
    font-size:18px;
}
.muted{
    color:var(--muted);
}
.kpi{
    font-size:34px;
    font-weight:800;
    margin-bottom:6px;
}
.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    padding:10px 0;
    border-bottom:1px solid rgba(120,255,190,.08);
}
.row:last-child{
    border-bottom:none;
}
.badge{
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    background:rgba(25,230,140,.12);
    color:#8ff2bf;
}
.list{
    display:grid;
    gap:10px;
}
.list-item{
    padding:12px 14px;
    border-radius:16px;
    border:1px solid rgba(120,255,190,.10);
    background:rgba(255,255,255,.02);
}
.footer-note{
    margin-top:18px;
    color:var(--muted);
    font-size:13px;
    text-align:center;
}
</style>
</head>
<body>
<div class="container">
    <div class="topbar">
        <div class="brand">SpamShield PRO</div>
        <div class="actions">
            <a class="btn" href="/radial-pro">Panele Dön</a>
            <a class="btn" href="/dashboard">Dashboard</a>
        </div>
    </div>

    {% block content %}{% endblock %}
</div>
</body>
</html>
