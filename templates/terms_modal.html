<!-- Kullanım Şartları Popup -->
<div id="termsModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.78); z-index:9999; align-items:center; justify-content:center; padding:18px;">
    <div style="background:#111827; color:white; width:100%; max-width:560px; border-radius:18px; padding:24px; border:1px solid rgba(255,255,255,0.08); box-shadow:0 18px 50px rgba(0,0,0,0.45);">
        <h2 style="margin-bottom:14px; color:#f9fafb;">Kullanım Şartları</h2>
        <p style="margin-bottom:12px; color:#d1d5db; line-height:1.6;">
            Bu yazılım <strong>ismail erat</strong>'a aittir.
        </p>
        <p style="margin-bottom:12px; color:#d1d5db; line-height:1.6;">
            Aşağıdaki işlemler kesinlikle yasaktır:
        </p>
        <ul style="padding-left:20px; margin-bottom:16px; color:#d1d5db;">
            <li style="margin-bottom:8px;">İzinsiz kopyalama</li>
            <li style="margin-bottom:8px;">Kaynak kod paylaşımı</li>
            <li style="margin-bottom:8px;">İzinsiz satış veya dağıtım</li>
            <li style="margin-bottom:8px;">Yetkisiz çoğaltma ve yeniden yayınlama</li>
        </ul>
        <p style="margin-bottom:12px; color:#d1d5db; line-height:1.6;">
            Devam ederek bu şartları kabul etmiş olursunuz.
        </p>

        <div style="display:flex; gap:10px; margin-top:18px; flex-wrap:wrap;">
            <button onclick="acceptTerms()" style="flex:1; min-width:180px; padding:12px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; background:#22c55e; color:white;">
                Kabul Ediyorum
            </button>
            <button onclick="declineTerms()" style="flex:1; min-width:180px; padding:12px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; background:#ef4444; color:white;">
                Kabul Etmiyorum
            </button>
        </div>
    </div>
</div>

<script>
window.addEventListener("load", function () {
    if (localStorage.getItem("spamshield_terms_accepted") !== "yes") {
        var modal = document.getElementById("termsModal");
        if (modal) modal.style.display = "flex";
    }
});

function acceptTerms() {
    localStorage.setItem("spamshield_terms_accepted", "yes");
    var modal = document.getElementById("termsModal");
    if (modal) modal.style.display = "none";
}

function declineTerms() {
    window.location.href = "https://www.google.com";
}
</script>
