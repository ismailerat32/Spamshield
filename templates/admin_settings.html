<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpamShield Ayarlar</title>
    <style>
        body {
            margin: 0;
            background: #0f1115;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .wrap {
            max-width: 700px;
            margin: 30px auto;
            padding: 20px;
        }
        .card {
            background: #1a1f29;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 0 8px rgba(0,0,0,.35);
        }
        h1 {
            margin-top: 0;
        }
        label {
            display: block;
            margin: 14px 0 8px;
            font-weight: bold;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #0f1722;
            color: #fff;
            box-sizing: border-box;
        }
        .check {
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        button, a.btn {
            background: #2563eb;
            color: #fff;
            border: none;
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            display: inline-block;
        }
        a.btn.secondary {
            background: #374151;
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <h1>⚙️ SpamShield Ayarlar</h1>

        <form method="POST">
            <div class="check">
                <input type="checkbox" name="enable_notifications" {% if settings.enable_notifications %}checked{% endif %}>
                <span>Bildirim açık</span>
            </div>

            <div class="check">
                <input type="checkbox" name="enable_vibration" {% if settings.enable_vibration %}checked{% endif %}>
                <span>Titreşim açık</span>
            </div>

            <div class="check">
                <input type="checkbox" name="enable_auto_delete" {% if settings.enable_auto_delete %}checked{% endif %}>
                <span>Otomatik silme</span>
            </div>

            <label>SMS Limit</label>
            <input type="number" name="sms_limit" value="{{ settings.sms_limit }}">

            <label>Polling Süresi (sn)</label>
            <input type="number" name="poll_interval" value="{{ settings.poll_interval }}">

            <label>Spam Threshold</label>
            <input type="number" name="spam_threshold" value="{{ settings.spam_threshold }}">

            <div class="btns">
                <button type="submit">💾 Kaydet</button>
                <a class="btn secondary" href="/admin">← Admin Panel</a>
                <a class="btn secondary" href="/admin/spam-logs">📜 Spam Logları</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
