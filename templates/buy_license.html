<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Lisans Satın Al</title>
<style>
body{background:linear-gradient(135deg,#0f172a,#0b1f5e,#1e3a8a);font-family:Arial,sans-serif;color:#fff;margin:0;min-height:100vh}
.wrap{max-width:520px;margin:40px auto;padding:20px}
.card{background:rgba(3,15,45,.95);padding:24px;border-radius:22px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
input,select,textarea,button{width:100%;box-sizing:border-box;padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:#020b2a;color:#fff;font-size:15px;margin-top:12px}
button{background:#1db446;border:0;font-weight:bold}
.msg-ok{background:rgba(16,185,129,.18);border:1px solid rgba(16,185,129,.35);color:#d1fae5;padding:14px;border-radius:14px;margin-bottom:16px}
.msg-err{background:rgba(239,68,68,.14);border:1px solid rgba(239,68,68,.35);color:#fee2e2;padding:14px;border-radius:14px;margin-bottom:16px}
.link{display:inline-block;margin-top:18px;color:#bfdbfe;text-decoration:none}
.small{color:#cbd5e1;font-size:14px;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <h1>Lisans Satın Al</h1>

        {% if error %}<div class="msg-err">{{ error }}</div>{% endif %}
        {% if success %}<div class="msg-ok">{{ success }}</div>{% endif %}

        <form method="POST">
            <select name="plan" required>
                <option value="">Paket seç</option>
                <option value="trial">Trial</option>
                <option value="pro">Pro - ₺199</option>
                <option value="premium">Premium - ₺399</option>
            </select>

            <select name="payment_method">
                <option value="manual">Manuel ödeme bildirimi</option>
                <option value="bank">Banka/EFT</option>
                <option value="iban">IBAN</option>
            </select>

            <textarea name="note" rows="5" placeholder="Ödeme notu, referans no, açıklama..."></textarea>

            <button type="submit">Talep Gönder</button>
        </form>

        <div class="small">
            Ödeme sonrası admin onayı ile lisans tanımlanır.
        </div>

        <a class="link" href="/pricing">Paketlere dön</a>
    </div>
</div>
</body>
</html>
