<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpamShield</title>

<style>
body{
  margin:0;
  background:#061133;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

.circle{
  position: relative;
  width: 260px;
  height: 260px;
  margin: 80px auto;
}

.slice{
  position:absolute;
  top:50%;
  left:50%;
  transform-origin:center;
  width:90px;
  height:90px;
  border-radius:16px;
  background:rgba(40,50,90,.8);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:13px;
}

.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:120px;
  height:120px;
  border-radius:50%;
  background:linear-gradient(45deg,#3aa6ff,#3a6bff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}
</style>
</head>

<body>

<h1>SpamShield</h1>
<p>Akıllı SMS Koruma Sistemi</p>

<div class="circle">

<a class="slice" data-url="/dashboard">🏠<span>Panel</span></a>
<a class="slice" data-url="/analysis">📩<span>Analiz</span></a>
<a class="slice" data-url="/blocked">🚫<span>Engel</span></a>
<a class="slice" data-url="/notifications">🔔<span>Bildirim</span></a>
<a class="slice" data-url="/settings">⚙️<span>Ayarlar</span></a>
<a class="slice" data-url="{{ license_target }}">🔑<span>Lisans</span></a>
<a class="slice" data-url="/reports">📊<span>Raporlar</span></a>
<a class="slice" data-url="/community">👥<span>Topluluk</span></a>
<a class="slice" data-url="/protection">🛡️<span>Koruma</span></a>

<div class="center">SS</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const slices = document.querySelectorAll(".slice");
  const total = slices.length;
  const radius = 120;

  slices.forEach((el, i) => {
    const angle = (360 / total) * i - 90;

    el.style.transform =
      `translate(-50%, -50%) rotate(${angle}deg) translateY(-${radius}px)`;

    const inner = el.querySelector("span");
    if (inner) {
      inner.style.transform = `rotate(${-angle}deg)`;
    }

    el.addEventListener("click", () => {
      window.location.href = el.dataset.url;
    });
  });
});
</script>

</body>
</html>
