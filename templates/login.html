<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f1115;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .box {
            background: #171a21;
            border: 1px solid #2b2f3a;
            border-radius: 16px;
            padding: 28px;
            width: 360px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.35);
        }
        h2 {
            margin-top: 0;
            text-align: center;
        }
        input, button, a {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid #333845;
            background: #0f1115;
            color: #eee;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        button {
            background: #2563eb;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .register {
            background: #22c55e;
        }
        .error {
            background: #351516;
            color: #ffb4b4;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .info {
            text-align: center;
            color: #aab1bf;
            font-size: 13px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔐 Giriş Yap</h2>

        <div class="info">
            SpamShield hesabın ile giriş yap
        </div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Kullanıcı adı" required>
            <input type="password" name="password" placeholder="Şifre" required>
            <button type="submit">Giriş Yap</button>
        </form>

        <!-- 🚀 ÜYE OL -->
        <a href="/register" class="register">Üye Ol</a>

    </div>
</body>
</html>
