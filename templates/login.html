<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SpamShield Giriş</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f1115;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-box {
            background: #171a21;
            border: 1px solid #2b2f3a;
            border-radius: 16px;
            padding: 28px;
            width: 340px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.35);
        }
        h2 {
            margin-top: 0;
            margin-bottom: 10px;
        }
        p {
            color: #aab1bf;
            font-size: 14px;
            margin-bottom: 18px;
        }
        input, button {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid #333845;
            background: #0f1115;
            color: #eee;
        }
        button {
            background: #1f6feb;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .error {
            background: #351516;
            color: #ffb4b4;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .hint {
            color: #8b95a7;
            font-size: 12px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🛡️ SpamShield Giriş</h2>
        <p>Yönetim paneline erişmek için giriş yap.</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Kullanıcı adı" required>
            <input type="password" name="password" placeholder="Şifre" required>
            <button type="submit">Giriş Yap</button>
        </form>

        <div class="hint">
            İlk giriş için varsayılan hesap:<br>
            kullanıcı adı: <strong>admin</strong><br>
            şifre: <strong>admin123</strong>
        </div>
    </div>
</body>
</html>
