<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Kullanıcı Ekle</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f1115;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .box {
            background: #171a21;
            border: 1px solid #2b2f3a;
            border-radius: 16px;
            padding: 28px;
            width: 420px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.35);
        }
        h2 { margin-top: 0; }
        input, select, button, a {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid #333845;
            background: #0f1115;
            color: #eee;
        }
        button {
            background: #0f9d58;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .back {
            display: block;
            text-align: center;
            text-decoration: none;
            background: #2563eb;
        }
        .error {
            background: #351516;
            color: #ffb4b4;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .success {
            background: #10281a;
            color: #86efac;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ddd;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>👤 Kullanıcı Ekle</h2>

        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        {% if success %}<div class="success">{{ success }}</div>{% endif %}

        <form method="POST" action="/add-user">
            <input type="text" name="username" placeholder="Kullanıcı adı" required>
            <input type="email" name="email" placeholder="Mail adresi">
            <input type="password" name="password" placeholder="Şifre" required>
            <input type="password" name="confirm_password" placeholder="Şifre tekrar" required>

            <select name="role">
                <option value="user">user</option>
                <option value="admin">admin</option>
            </select>

            <input type="text" value="Lisans otomatik üretilecek" disabled>
            <input type="date" name="expires_at" required>

            <label>
                <input type="checkbox" name="active" checked style="width:auto; margin-right:8px;">
                Kullanıcı aktif
            </label>

            <button type="submit">Kullanıcıyı Oluştur</button>
        </form>

        <a class="back" href="/">Panele Dön</a>
    </div>
</body>
</html>
