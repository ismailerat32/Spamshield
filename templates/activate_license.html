<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Lisans Aktivasyonu</title>
<style>
body {
    background: linear-gradient(135deg, #0f172a, #0b1f5e, #1e3a8a);
    font-family: Arial, sans-serif;
    color: white;
    margin: 0;
    min-height: 100vh;
}
.wrap {
    max-width: 520px;
    margin: 40px auto;
    padding: 20px;
}
.card {
    background: rgba(3, 15, 45, 0.95);
    padding: 24px;
    border-radius: 22px;
    box-shadow: 0 10px 30px rgba(0,0,0,.25);
}
input, button {
    width: 100%;
    box-sizing: border-box;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.08);
    background: #020b2a;
    color: white;
    font-size: 15px;
}
button {
    background: #1db446;
    border: 0;
    font-weight: bold;
    margin-top: 14px;
}
.msg-ok {
    background: rgba(16, 185, 129, .18);
    border: 1px solid rgba(16, 185, 129, .35);
    color: #d1fae5;
    padding: 14px;
    border-radius: 14px;
    margin-bottom: 16px;
}
.msg-err {
    background: rgba(239, 68, 68, .14);
    border: 1px solid rgba(239, 68, 68, .35);
    color: #fee2e2;
    padding: 14px;
    border-radius: 14px;
    margin-bottom: 16px;
}
.link {
    color: #bfdbfe;
    text-decoration: none;
}
</style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <h1>Lisans Aktivasyonu</h1>

        {% if error %}
        <div class="msg-err">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="msg-ok">
            {{ success }}
            {% if license_key %}
            <div style="margin-top:8px;">Anahtar: <strong>{{ license_key }}</strong></div>
            {% endif %}
        </div>
        {% endif %}

        <form method="POST">
            <input type="text" name="license_key" placeholder="SSHD-XXXX-XXXX-XXXX" required>
            <button type="submit">Lisansı Aktive Et</button>
        </form>

        <div style="margin-top:18px;">
            <a class="link" href="/my-license">Lisansım</a>
            &nbsp; | &nbsp;
            <a class="link" href="/dashboard">Dashboard'a dön</a>
        </div>
    </div>
</div>
</body>
</html>
