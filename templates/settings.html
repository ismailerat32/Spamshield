<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ t["settings"] }} - {{ t["app_title"] }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f1115;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .box {
            background: #171a21;
            border: 1px solid #2b2f3a;
            border-radius: 16px;
            padding: 28px;
            width: 420px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.35);
        }
        h2 {
            margin-top: 0;
            margin-bottom: 10px;
        }
        .small {
            color: #aab1bf;
            font-size: 13px;
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 14px;
            color: #e5e7eb;
        }
        input[type="checkbox"] {
            margin-right: 8px;
        }
        input[type="number"] {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            margin-top: 6px;
            border-radius: 10px;
            border: 1px solid #333845;
            background: #0f1115;
            color: #eee;
        }
        button, a {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            text-decoration: none;
            color: white;
            display: block;
            text-align: center;
            font-weight: bold;
        }
        button {
            background: #475569;
            cursor: pointer;
        }
        .back {
            background: #2563eb;
        }
        .error {
            background: #351516;
            color: #ffb4b4;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .success {
            background: #10281a;
            color: #86efac;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .langbar {
            margin-bottom: 14px;
        }
        .langbar a {
            width: auto;
            display: inline-block;
            margin: 0 6px 0 0;
            padding: 8px 12px;
            background: #374151;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="langbar">
            <a href="/set-language/tr">{{ t["turkish"] }}</a>
            <a href="/set-language/en">{{ t["english"] }}</a>
        </div>

        <h2>🔔 {{ t["settings"] }}</h2>
        <div class="small">{{ t["user"] }}: <strong>{{ username }}</strong></div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="success">{{ success }}</div>
        {% endif %}

        <form method="POST" action="/settings">
            <label>
                <input type="checkbox" name="notifications_enabled"
                {% if settings.notifications_enabled %}checked{% endif %}>
                Bildirimler açık
            </label>

            <label>
                <input type="checkbox" name="notify_spam"
                {% if settings.notify_spam %}checked{% endif %}>
                SPAM için bildirim gönder
            </label>

            <label>
                <input type="checkbox" name="notify_supheli"
                {% if settings.notify_supheli %}checked{% endif %}>
                ŞÜPHELİ için bildirim gönder
            </label>

            <label>
                Minimum bildirim skoru
                <input type="number" name="min_notify_score"
                value="{{ settings.min_notify_score }}">
            </label>

            <button type="submit">Ayarları Kaydet</button>
        </form>

        <a class="back" href="/">Panele Dön</a>
    </div>
</body>
</html>
