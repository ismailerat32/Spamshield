<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Şifre Değiştir - SpamShield</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f1115;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .box {
            background: #171a21;
            border: 1px solid #2b2f3a;
            border-radius: 16px;
            padding: 28px;
            width: 380px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.35);
        }
        h2 { margin-top: 0; }
        .small { color: #aab1bf; font-size: 13px; margin-bottom: 16px; }
        input, button, a {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid #333845;
            background: #0f1115;
            color: #eee;
        }
        button {
            background: #1f6feb;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .back {
            display: block;
            text-align: center;
            text-decoration: none;
            background: #2563eb;
        }
        .error {
            background: #351516;
            color: #ffb4b4;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .success {
            background: #10281a;
            color: #86efac;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔐 Şifre Değiştir</h2>
        <div class="small">Kullanıcı: <strong>{{ username }}</strong></div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="success">{{ success }}</div>
        {% endif %}

        <form method="POST" action="/change-password">
            <input type="password" name="current_password" placeholder="Mevcut şifre" required>
            <input type="password" name="new_password" placeholder="Yeni şifre" required>
            <input type="password" name="confirm_password" placeholder="Yeni şifre tekrar" required>
            <button type="submit">Şifreyi Güncelle</button>
        </form>

        <a class="back" href="/">Panele Dön</a>
    </div>
</body>
</html>
