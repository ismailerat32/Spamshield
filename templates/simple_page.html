<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }}</title>
  <style>
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(180deg,#020817,#071a3a);
      color:#eef4ff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      box-sizing:border-box;
    }
    .card{
      width:100%;
      max-width:420px;
      background:rgba(9,18,40,.9);
      border:1px solid rgba(96,165,250,.18);
      border-radius:24px;
      padding:24px 18px;
      box-shadow:0 18px 60px rgba(0,0,0,.28);
      text-align:center;
    }
    h1{
      margin:0 0 12px;
      font-size:34px;
    }
    p{
      margin:0 0 18px;
      font-size:16px;
      line-height:1.55;
      color:#9fb6d9;
    }
    a{
      display:inline-block;
      text-decoration:none;
      background:linear-gradient(135deg,#3b82f6,#60a5fa);
      color:#fff;
      padding:14px 18px;
      border-radius:16px;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>{{ page_title }}</h1>
    <p>{{ page_desc }}</p>
    <a href="/radial">Menüye dön</a>
  </div>
</body>
</html>
