<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whitelist Paneli</title>

<style>
body {
    margin: 0;
    background: #0b1020;
    color: white;
    font-family: Arial, sans-serif;
}

.wrap {
    max-width: 1100px;
    margin: 30px auto;
    padding: 20px;
}

.top {
    margin-bottom: 24px;
}

.top h1 {
    font-size: 40px;
    margin: 0 0 12px 0;
    font-weight: 800;
}

.back-link {
    color: #93c5fd;
    text-decoration: none;
    font-weight: 600;
    display: inline-block;
    margin-top: 6px;
}

.card {
    background: #1a1f2e;
    padding: 16px;
    border-radius: 16px;
    margin-bottom: 14px;
}

.row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

.add-form {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
}

.add-form input {
    padding: 12px 14px;
    border-radius: 12px;
    border: none;
    min-width: 260px;
    flex: 1;
    font-size: 16px;
}

.btn-add {
    background: #22c55e;
    border: none;
    padding: 12px 16px;
    border-radius: 12px;
    color: white;
    font-weight: 700;
    font-size: 16px;
}

.btn-remove {
    background: #dc2626;
    border: none;
    padding: 10px 14px;
    border-radius: 12px;
    color: white;
    font-weight: 700;
    font-size: 15px;
}

.sender {
    font-size: 18px;
    font-weight: 700;
    color: #f3f4f6;
    word-break: break-word;
}

.empty {
    color: #cbd5e1;
}
</style>
</head>
<body>

<div class="wrap">

    <div class="top">
        <h1>🧠 Whitelist Paneli</h1>
        <a class="back-link" href="/admin">← Admin panele dön</a>
    </div>

    <div class="card">
        <form class="add-form" method="POST" action="/admin/whitelist/add">
            <input type="text" name="sender" placeholder="Örn: HALKBANK" required>
            <button class="btn-add" type="submit">➕ Ekle</button>
        </form>
    </div>

    {% for sender in whitelist %}
    <div class="card">
        <div class="row">
            <div class="sender">{{ sender }}</div>
            <form method="POST" action="/admin/whitelist/remove">
                <input type="hidden" name="sender" value="{{ sender }}">
                <button class="btn-remove" type="submit">❌ Kaldır</button>
            </form>
        </div>
    </div>
    {% else %}
    <div class="card empty">Liste boş</div>
    {% endfor %}

</div>

</body>
</html>
