<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Şifre Oluştur - SpamShield</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(35,105,255,.18), transparent 35%),
                radial-gradient(circle at bottom right, rgba(0,200,140,.16), transparent 35%),
                linear-gradient(135deg, #0f172a, #111827, #0b1220);
            color: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 520px;
            background: rgba(17,24,39,.92);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 22px;
            box-shadow: 0 20px 60px rgba(0,0,0,.45);
            padding: 30px;
        }
        h1 { margin: 0 0 12px; color: #fff; }
        p { color: #9ca3af; line-height: 1.6; }
        label {
            display: block;
            margin: 18px 0 8px;
            font-size: 14px;
            font-weight: 700;
            color: #d1d5db;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,.1);
            background: rgba(255,255,255,.04);
            color: #fff;
            outline: none;
        }
        .btn {
            width: 100%;
            margin-top: 16px;
            padding: 14px 16px;
            border: 0;
            border-radius: 14px;
            background: linear-gradient(135deg, #10b981, #06b6d4);
            color: #fff;
            font-weight: 700;
        }
        .alert {
            border-radius: 14px;
            padding: 14px 16px;
            margin: 16px 0;
            font-size: 14px;
        }
        .error {
            background: rgba(239,68,68,.12);
            border: 1px solid rgba(239,68,68,.25);
            color: #fecaca;
        }
        .back { margin-top: 18px; text-align: center; }
        .back a { color: #93c5fd; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Yeni Şifre Oluştur</h1>

        {% if valid %}
            <p>Yeni şifreni belirle. Bu bağlantı tek kullanımlıktır ve süreli çalışır.</p>

            {% if error %}
                <div class="alert error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/reset-password">
                <input type="hidden" name="token" value="{{ token }}">

                <label for="password">Yeni şifre</label>
                <input type="password" id="password" name="password" required>

                <label for="confirm_password">Yeni şifre tekrar</label>
                <input type="password" id="confirm_password" name="confirm_password" required>

                <button class="btn" type="submit">Şifreyi Güncelle</button>
            </form>
        {% else %}
            <div class="alert error">{{ error or 'Geçersiz veya süresi dolmuş bağlantı.' }}</div>
        {% endif %}

        <div class="back">
            <a href="/login">← Giriş sayfasına dön</a>
        </div>
    </div>
</body>
</html>
